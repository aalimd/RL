# HEARTBEAT: 2026-02-19 22:55
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy (Zip Strategy)
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, zip, pdo_mysql

      - name: 📦 Install Dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 📦 Create Deployment Package
        run: |
          mkdir deploy_package
          
          # Copy root files to deploy_package
          cp index.php deploy_package/
          cp .htaccess deploy_package/
          if [ -d "install" ]; then cp -r install deploy_package/install/; fi
          
          cd backend
          # Define unique names
          ZIP_NAME="release_${{ github.sha }}.zip"
          SCRIPT_NAME="unzip_${{ github.sha }}.php"
          TOKEN="${{ github.sha }}"
          
          # Zip the contents
          zip -r "../deploy_package/$ZIP_NAME" . -x "*.git*" "*.github*" "node_modules/*" "storage/*.key" "storage/logs/*" ".env" "phpunit.xml" ".DS_Store" "tests/*"
          
          # Create Smart & SAFE Extraction Script
          echo "<?php
          if (!isset(\$_GET['token']) || \$_GET['token'] !== '$TOKEN') {
              http_response_code(403);
              die('Forbidden');
          }

          // Enable error reporting for debugging
          ini_set('display_errors', '1');
          ini_set('display_startup_errors', '1');
          error_reporting(E_ALL);

          // Increase limits
          ini_set('memory_limit', '512M');
          ini_set('max_execution_time', 300);

          header('Content-Type: text/plain'); 
          echo '🚀 Starting Safe Deployment...'.PHP_EOL;

          \$zipFile = '$ZIP_NAME';
          \$extractPath = __DIR__ . '/backend';

          try {
              // Check if .env exists
              if (!file_exists(\$extractPath . '/.env')) {
                  echo '⚠️ WARNING: backend/.env file is missing on the server!'.PHP_EOL;
              } else {
                  echo 'ℹ️ backend/.env file exists on the server.'.PHP_EOL;
              }

              // 1. INTEGRITY CHECK (Verify Zip before touching anything)
              \$zip = new ZipArchive;
              if (\$zip->open(\$zipFile) !== TRUE) {
                  throw new Exception('❌ Invalid or corrupted ZIP file. Aborting.');
              }
              echo '✅ Integrity Check Passed.'.PHP_EOL;

              // 2. PERMISSION CHECK (Non-destructive write test)
              \$testFile = \$extractPath . '/write_test.tmp';
              if (@file_put_contents(\$testFile, 'test') === false) {
                  throw new Exception('❌ Write permission denied. Cannot write to backend folder.');
              }
              @unlink(\$testFile);
              echo '✅ Write Permission Verified.'.PHP_EOL;

              // 2.5 SMART CLEANUP (Prevent Ghost Code, Protect .env)
              \$foldersToDelete = [
                  'app', 'bootstrap/cache', 'config', 'database', 'public/build', 'resources', 'routes', 'vendor'
              ];
              foreach (\$foldersToDelete as \$folder) {
                  \$target = \$extractPath . '/' . \$folder;
                  if (file_exists(\$target)) {
                      echo '🧹 Removing old ' . \$folder . '...'.PHP_EOL;
                      // recursive delete
                      \$files = new RecursiveIteratorIterator(
                          new RecursiveDirectoryIterator(\$target, RecursiveDirectoryIterator::SKIP_DOTS),
                          RecursiveIteratorIterator::CHILD_FIRST
                      );
                      foreach (\$files as \$fileinfo) {
                          \$todo = (\$fileinfo->isDir() ? 'rmdir' : 'unlink');
                          @\$todo(\$fileinfo->getRealPath());
                      }
                      @rmdir(\$target);
                  }
              }
              echo '✅ Smart Cleanup Complete (Kept .env and storage).'.PHP_EOL;

              // 3. EXTRACTION
              if (!file_exists(\$extractPath)) {
                  mkdir(\$extractPath, 0755, true);
              }
              
              if (!\$zip->extractTo(\$extractPath)) {
                  throw new Exception('❌ Extraction failed during process.');
              }
              \$zip->close();
              echo '✅ Files Extracted Successfully.'.PHP_EOL;

              // 3.5 FIX PERMISSIONS
              \$dirsToFix = [
                  '/storage',
                  '/storage/app',
                  '/storage/framework',
                  '/storage/framework/cache',
                  '/storage/framework/sessions',
                  '/storage/framework/views',
                  '/storage/logs',
                  '/bootstrap/cache'
              ];
              foreach (\$dirsToFix as \$subdir) {
                  \$path = \$extractPath . \$subdir;
                  if (file_exists(\$path)) {
                      @chmod(\$path, 0775); // Try 775 first
                      if (!is_writable(\$path)) {
                          @chmod(\$path, 0777); // Fallback to 777
                      }
                  }
              }
              echo '✅ Permissions Fixed.'.PHP_EOL;

              // 4. POST-DEPLOYMENT OPTIMIZATION
              if (function_exists('opcache_reset')) {
                  opcache_reset();
                  echo '✅ OpCache Reset.'.PHP_EOL;
              }

              if (file_exists(\$extractPath . '/vendor/autoload.php')) {
                  require \$extractPath . '/vendor/autoload.php';
                  \$app = require_once \$extractPath . '/bootstrap/app.php';
                  \$app->instance('request', \Illuminate\Http\Request::create('http://localhost'));
                  \$kernel = \$app->make(Illuminate\Contracts\Http\Kernel::class);
                  \$kernel->bootstrap();

                  echo '✅ Laravel Bootstrapped.'.PHP_EOL;

                  Illuminate\Support\Facades\Artisan::call('migrate', ['--force' => true]);
                  echo '✅ Database Migrated.'.PHP_EOL;

                  Illuminate\Support\Facades\Artisan::call('settings:encrypt');
                  echo '✅ Settings Encrypted.'.PHP_EOL;

                  Illuminate\Support\Facades\Artisan::call('view:clear');
                  Illuminate\Support\Facades\Artisan::call('cache:clear');
                  Illuminate\Support\Facades\Artisan::call('config:cache');
                  Illuminate\Support\Facades\Artisan::call('route:clear');
                  echo '✅ Cache Cleared.'.PHP_EOL;
              }

          } catch (\Throwable \$e) {
              http_response_code(500);
              echo '🔥 CRITICAL ERROR: [' . get_class(\$e) . '] ' . \$e->getMessage() . PHP_EOL;
              echo 'File: ' . \$e->getFile() . ' on line ' . \$e->getLine() . PHP_EOL;
              echo 'Trace: ' . PHP_EOL . \$e->getTraceAsString() . PHP_EOL;
              exit(1);
          } finally {
              // 5. CLEANUP (Always clean up zip and script)
              if (file_exists(\$zipFile)) @unlink(\$zipFile);
              // Self-destruct script
              @unlink(__FILE__);
              echo '🧹 Cleanup Complete.';
          }
          ?>" > "../deploy_package/$SCRIPT_NAME"

      - name: 📂 Sync files (Upload Zip)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 600000
          security: loose
          local-dir: ./deploy_package/
          server-dir: ./

      - name: 🚀 Trigger Unzip on Server
        run: curl --fail-with-body --show-error --silent --location "${{ secrets.APP_URL }}/unzip_${{ github.sha }}.php?token=${{ github.sha }}"
